database:
  type: "mssql"
  driver: "ODBC Driver 17 for SQL Server"
  server: ""
  port:
  user: ""
  password: ""
  db: "ecology"
  sql: |
    DECLARE @requestId INT = :request_id;

    DECLARE @billId INT, @tableName NVARCHAR(200);
    DECLARE @sql NVARCHAR(MAX), @allIds NVARCHAR(MAX) = '';

    -- Step 1: billId + 表名
    SELECT @billId = wb.formid, @tableName = wbi.tablename
    FROM workflow_requestbase wr
    JOIN workflow_base wb ON wb.id = wr.workflowid
    LEFT JOIN workflow_bill wbi ON wbi.id = wb.formid
    WHERE wr.requestid = @requestId;

    -- Step 2: 拼接所有附件字段值
    SELECT @sql = ISNULL(@sql + '+ '','' + ', '')
      + 'ISNULL(CAST([' + fieldname + '] AS NVARCHAR(MAX)), '''')'
    FROM workflow_billfield
    WHERE billid = @billId AND fieldhtmltype = '6' AND detailtable = '';

    IF @sql IS NULL
    BEGIN
        SELECT '[]' AS result;
    END
    ELSE
    BEGIN
        SET @sql = 'SELECT @ids = ' + @sql + ' FROM ' + QUOTENAME(@tableName)
          + ' WHERE requestId = ' + CAST(@requestId AS NVARCHAR);
        EXEC sp_executesql @sql, N'@ids NVARCHAR(MAX) OUTPUT', @allIds OUTPUT;

        -- 去掉首尾逗号
        SET @allIds = REPLACE(REPLACE(@allIds, ',,', ','), ',,', ',');
        WHILE LEFT(@allIds, 1) = ',' SET @allIds = STUFF(@allIds, 1, 1, '');
        WHILE RIGHT(@allIds, 1) = ',' SET @allIds = STUFF(@allIds, LEN(@allIds), 1, '');

        IF @allIds = '' OR @allIds = '0'
        BEGIN
            SELECT '[]' AS result;
        END
        ELSE
        BEGIN
            -- Step 3 & 4: XML 拆分 + 查文件路径
            DECLARE @xml XML = CAST('<a>' + REPLACE(@allIds, ',', '</a><a>') + '</a>' AS XML);
            WITH split_ids AS (
                SELECT LTRIM(RTRIM(T.c.value('.', 'NVARCHAR(100)'))) AS docId
                FROM @xml.nodes('/a') T(c)
            )
            SELECT DISTINCT
                imf.imagefileid  AS file_id,
                imf.imagefilename AS filename,
                imf.fileSize     AS file_size,
                imf.filerealpath AS physical_path
            FROM split_ids s
            JOIN docimagefile dif ON dif.docid = CAST(s.docId AS INT)
            JOIN imagefile imf ON imf.imagefileid = dif.imagefileid
            WHERE s.docId != ''
            ORDER BY imf.imagefileid;
        END
    END

